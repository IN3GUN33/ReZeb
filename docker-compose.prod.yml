version: "3.9"
# Production docker-compose — use with managed cloud DB + Redis + S3 (not included)
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  api:
    image: ${REGISTRY:-ghcr.io/in3gun33/rezeb}/api:${TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rezeb-api
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    networks:
      - rezeb-net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  worker:
    image: ${REGISTRY:-ghcr.io/in3gun33/rezeb}/api:${TAG:-latest}
    container_name: rezeb-worker
    restart: always
    env_file: .env
    depends_on:
      - redis
    networks:
      - rezeb-net
    command: python -m app.workers.main
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  frontend:
    image: ${REGISTRY:-ghcr.io/in3gun33/rezeb}/frontend:${TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rezeb-frontend
    restart: always
    ports:
      - "3000:3000"
    networks:
      - rezeb-net

  redis:
    image: redis:7-alpine
    container_name: rezeb-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - rezeb-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: rezeb-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - frontend
    networks:
      - rezeb-net

volumes:
  redis-data:

networks:
  rezeb-net:
    driver: bridge
