version: "3.9"

services:
  # ─── Backend API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rezeb-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rezeb-net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Background Worker ──────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rezeb-worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rezeb-net
    command: python -m app.workers.main

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rezeb-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - rezeb-net

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rezeb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rezeb}
      POSTGRES_USER: ${POSTGRES_USER:-rezeb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rezeb_dev_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "5432:5432"
    networks:
      - rezeb-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rezeb} -d ${POSTGRES_DB:-rezeb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rezeb-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - rezeb-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── ML Service (stub for dev; replace with real GPU VM in prod) ───────────
  ml-service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: rezeb-ml-service
    restart: unless-stopped
    environment:
      ROBOFLOW_API_KEY: ${ROBOFLOW_API_KEY:-}
      ROBOFLOW_MODEL: ${ROBOFLOW_MODEL:-concrete-defect-detection-zuym8/1}
      YOLO_CONFIDENCE_THRESHOLD: ${YOLO_CONFIDENCE_THRESHOLD:-0.45}
    ports:
      - "8001:8001"
    networks:
      - rezeb-net

  # ─── MinIO (S3-compatible, dev only) ────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: rezeb-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - rezeb-net

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  rezeb-net:
    driver: bridge
